# Rental card: real TwoRoom data on the rented box (4x RTX 2080 Ti, 80 cores).
# Derived from configs/toy_lewm_vit.yaml -- the card the overnight Mac run and
# the resume/equivalence gates consumed -- with ONLY the changes listed below.
# Everything not listed is byte-identical to that validated card.
#
# CHANGES vs configs/toy_lewm_vit.yaml:
#   1. data.h5_path:         toy_tworoom.h5 -> /dev/shm/data/tworoom.h5
#                            (real 12 GB file, RAM-staged; md5 120e4327f4f2cf64b74928ca5bfca719)
#   2. training.batch_size:  16 -> 128  (reference value; the laptop concession is gone.
#                            GATE: re-run check_resume_equivalence on THIS card before the full run.)
#   3. training.num_workers: ADDED, 16  (Gate C knee on this box: ~1000 clips/s -> ~1.9 h loading.
#                            Script default was 0, so adding the key is safe.)
#   4. training.epochs:      8 -> 10   (paper App. E trains TwoRoom for 10 epochs, and
#                            parallel_data.py's projection assumes 10. DECISION PENDING YOUR
#                            CONFIRMATION -- set back to 8 for strict continuity with the
#                            Mac overnight run instead.)
#   5. experiment + model.name renamed (provenance only: keeps rental run folders and
#                            manifests distinct from the toy runs; changes no computation).
#
# Remaining recorded deviations from the reference: img_size 32 (ref 224) and
# patch_size 4 (ref 14, forced by the image size). Batch is now the reference value,
# so SIGReg's across-batch bell statistic runs at reference sample size, and the
# batch-16 BatchNorm eval artifact should shrink -- but the gate is still probe R^2,
# never eval-mode pred.
experiment: rental_tworoom_vit

model:
  name: rental_tworoom_vit
  encoder: vit              # <- the real thing, not the CNN stand-in
  img_size: 32              # DEVIATION: reference 224
  patch_size: 4             # DEVIATION: reference 14 (forced by img_size)
  enc_depth: 12             # reference
  enc_heads: 3              # reference
  embed_dim: 192            # reference (was 64 in the CNN toy)
  action_dim: 2
  history_size: 3           # repo config (paper says 1 for TwoRoom -- conflict)
  depth: 6                  # reference
  heads: 16                 # reference
  dim_head: 64              # reference
  mlp_dim: 2048             # reference
  proj_hidden: 2048         # reference
  dropout: 0.1              # reference
  enc_width: 32             # unused when encoder: vit

data:
  h5_path: /dev/shm/data/tworoom.h5   # CHANGED (was toy_tworoom.h5)
  frameskip: 5
  train_split: 0.9
  data_seed: 42

training:
  epochs: 10                # CHANGED (was 8) -- see header, change 4
  batch_size: 128           # CHANGED (was 16) -- reference value restored
  learning_rate: 0.00005    # reference
  weight_decay: 0.001       # reference
  num_preds: 1
  grad_clip: 1.0
  log_every: 10
  num_workers: 16           # ADDED -- Gate C knee on this box (script default: 0)

loss:
  sigreg_weight: 0.09       # reference
  sigreg_kwargs:
    knots: 17               # reference
    num_proj: 1024          # reference (full, unlike the CNN toy's 512)

requirements_file: requirements.txt
seed: 0
