# Toy LeWM -- the debugging fixture, NOT a reproduction.
#
# This trains the from-scratch LeWM against the 32x32 toy world so we can find
# bugs for free. Nothing measured here is a result. When we rent a machine, the
# data path swaps to the real tworoom.h5, the encoder swaps to ViT-Tiny at
# 224px, and this file is replaced by the reference config's values.
experiment: toy_lewm

model:
  name: toy_lewm            # arm identity (folder name + scorekeeper grouping)
  embed_dim: 64             # reference: 192 (ours is smaller for the toy)
  action_dim: 2
  history_size: 3           # NOTE: repo config says 3; paper App. E says 1 for
                            # TwoRoom. Unresolved. We follow the repo.
  depth: 4                  # reference: 6
  heads: 4                  # reference: 16
  dim_head: 32              # reference: 64
  mlp_dim: 256              # reference: 2048
  proj_hidden: 256          # reference: 2048
  dropout: 0.1              # reference: 0.1
  enc_width: 32             # DEVIATION: CNN encoder, not ViT-Tiny (toy only)

data:
  h5_path: toy_tworoom.h5   # swap to the real file when renting
  frameskip: 5              # reference
  train_split: 0.9          # reference
  data_seed: 42             # separate from the run seed: same clips every arm

training:
  epochs: 32                 # toy only. reference: 10 (paper) / 100 (repo config)
  batch_size: 64            # reference: 128
  learning_rate: 0.00005    # reference: 5e-5
  weight_decay: 0.001       # reference: 1e-3
  num_preds: 1              # reference
  grad_clip: 1.0
  log_every: 20

loss:
  sigreg_weight: 0.09       # reference lambda
  sigreg_kwargs:
    knots: 17               # reference
    num_proj: 512           # reference: 1024 (halved for toy speed)

requirements_file: requirements.txt
seed: 0
